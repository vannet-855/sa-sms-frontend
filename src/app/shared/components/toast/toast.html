<div class="flex flex-col gap-2">
    @for (t of toastService.toasts(); track t.id) {
    <div class="toast-wrapper flex items-center gap-3 rounded-xl border px-4 py-3 shadow-xl text-sm min-w-[320px] max-w-[420px]"
        [ngClass]="{
        'border-emerald-500/30 bg-emerald-950 text-emerald-200': t.type === 'success',
        'border-red-500/30 bg-red-950 text-red-200': t.type === 'error',
        'border-amber-500/30 bg-amber-950 text-amber-200': t.type === 'warning',
        'border-sky-500/30 bg-sky-950 text-sky-200': t.type === 'info',
      }">
        <div class="flex h-8 w-8 items-center justify-center rounded-full" [ngClass]="{
          'bg-emerald-500/20': t.type === 'success',
          'bg-red-500/20': t.type === 'error',
          'bg-amber-500/20': t.type === 'warning',
          'bg-sky-500/20': t.type === 'info',
        }">
            @if (t.type === 'success') {
            <i class="fa-solid fa-check text-emerald-400 text-xs"></i>
            } @else if (t.type === 'error') {
            <i class="fa-solid fa-xmark text-red-400 text-sm"></i>
            } @else if (t.type === 'warning') {
            <i class="fa-solid fa-triangle-exclamation text-amber-400 text-xs"></i>
            } @else {
            <i class="fa-solid fa-circle-info text-sky-400 text-xs"></i>
            }
        </div>
        <span class="flex-1">{{ t.message }}</span>
        <button (click)="toastService.remove(t.id)" class="text-slate-600 hover:text-slate-300 transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    }
</div>
